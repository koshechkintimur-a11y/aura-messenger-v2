name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build AuraRelay.xcframework
        run: |
          cd relay
          go get ./...
          gomobile bind -target=ios -iosversion=18.0 -o ../Aura/AuraRelay.xcframework ./pion/ios

      - name: Generate Xcode project
        working-directory: Aura
        run: |
          xcodegen generate --spec project.yml
          ls -la Aura.xcodeproj/

      - name: Build iOS app
        working-directory: Aura
        run: |
          xcodebuild \
            -project Aura.xcodeproj \
            -scheme Aura \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r Aura/.build/Build/Products/Release-iphoneos/Aura.app Payload/
          zip -r Aura-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS
          path: Aura-unsigned.ipa
