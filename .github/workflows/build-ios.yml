name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ── 1. Install tools ──
      - name: Install XcodeGen
        run: brew install xcodegen

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      # ── 2. Build Go → xcframework ──
      - name: Build AuraRelay.xcframework
        run: |
          cd relay
          go get ./...
          gomobile bind \
            -target=ios \
            -iosversion=18.0 \
            -o ../Aura/AuraRelay.xcframework \
            ./pion/ios

      # ── 3. Generate Xcode project ──
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml --project Aura

      # ── 4. Build Swift → unsigned IPA ──
      - name: Build iOS app
        run: |
          xcodebuild \
            -project Aura.xcodeproj \
            -scheme Aura \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 5. Package IPA ──
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r .build/Build/Products/Release-iphoneos/Aura.app Payload/
          zip -r Aura-unsigned.ipa Payload

      # ── 6. Upload artifact ──
      - uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS
          path: Aura-unsigned.ipa
