name: Aura
options:
  bundleIdPrefix: com.aura.messenger
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Aura:
    type: application
    platform: iOS
    sources: .
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aura.messenger
        PRODUCT_NAME: Aura
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        OTHER_LINKER_FLAGS:
          - "-framework AuraRelay"
